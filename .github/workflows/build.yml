name: Build IPA

on:
  workflow_dispatch

jobs:

 build:

  runs-on: macos-latest

  steps:

  - uses: actions/checkout@v4

  - name: Build
    run: |

      xcodebuild \
      -scheme MyApp \
      -configuration Release \
      -sdk iphoneos \
      CODE_SIGNING_ALLOWED=NO

  - name: Create IPA
    run: |

      mkdir Payload
      cp -r build/Release-iphoneos/*.app Payload/
      zip -r app.ipa Payload

  - uses: actions/upload-artifact@v4
    with:
      name: ipa
      path: app.ipa
